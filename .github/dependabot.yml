version: 2
updates:
  # JavaScript/TypeScript dependencies (pnpm workspace)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    groups:
      # These packages are always released together at the same version
      typescript-eslint:
        patterns:
          - 'typescript-eslint'
          - '@typescript-eslint/*'
      # Vite, its React plugin, and Vitest are tightly coupled across major versions
      vite-ecosystem:
        patterns:
          - 'vite'
          - '@vitejs/*'
          - 'vitest'
          - '@vitest/*'
      # ESLint core and its official packages
      eslint-ecosystem:
        patterns:
          - 'eslint'
          - '@eslint/*'
          - 'eslint-config-*'
          - 'eslint-plugin-*'
      # react and react-dom are from the same monorepo and must always be on
      # the same version; their @types/* packages track them directly
      react-ecosystem:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      # socket.io and socket.io-client are the server/client halves of the
      # same library and must be on the same major version (shared protocol)
      socket-io:
        patterns:
          - 'socket.io'
          - 'socket.io-client'
    ignore:
      # @types/node majors are upgraded by hand, never by Dependabot, because
      # the types must match the *deployed* Node runtime — bumping them ahead
      # of the runtime lets tsc green-light Node APIs that don't exist at
      # runtime. A Node major upgrade is a coordinated change across
      # engines.node (package.json), .nvmrc, node-version (ci.yml), and
      # NODE_VERSION (render.yaml), and we only move to even-numbered LTS
      # lines. Minor/patch updates within the current major still flow.
      # (A scheduled routine performs the Node 26 upgrade once 26 is Active
      # LTS, ~Nov 2026, and removes this ignore as part of that PR.)
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    groups:
      github-actions:
        patterns:
          - '*'
